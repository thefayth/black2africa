<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
  <title id="title">Black2Africa route fabric pattern</title>
  <desc id="desc">A dark editorial route fabric with grid lines, bridge arcs, and destination nodes.</desc>
  <defs>
